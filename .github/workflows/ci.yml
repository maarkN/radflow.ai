name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    name: Lint, typecheck and test (Node workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -r --if-present run test:e2e

  python:
    name: Lint, typecheck and test (report-ai)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/report-ai
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - name: Eval harness (red eval = red build)
        run: PYTHONPATH=src AI_PROVIDER=stub uv run python -m report_ai.eval
