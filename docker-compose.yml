name: radflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-radflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radflow}
      POSTGRES_DB: ${POSTGRES_DB:-radflow}
    ports:
      - '${POSTGRES_PORT:-5434}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ops/postgres/init.sql:/docker-entrypoint-initdb.d/10-create-databases.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.12-alpine
    command: ['--jetstream', '--http_port', '8222']
    ports:
      - '${NATS_PORT:-4222}:4222'
      - '${NATS_MONITOR_PORT:-8222}:8222'
    volumes:
      - natsdata:/data
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:8222/healthz']
      interval: 5s
      timeout: 3s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:latest
    environment:
      OHIF_PLUGIN_ENABLED: 'true'
    volumes:
      - ./ops/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthancdata:/var/lib/orthanc/db
    ports:
      - '${ORTHANC_HTTP_PORT:-8042}:8042'
      - '${ORTHANC_DICOM_PORT:-4242}:4242'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ['--config=/etc/otel/config.yaml']
    volumes:
      - ./ops/otel/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - '${OTEL_GRPC_PORT:-4317}:4317'
      - '${OTEL_HTTP_PORT:-4318}:4318'
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - '${JAEGER_UI_PORT:-16686}:16686'

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9091}:9090'

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3300}:3000'
    depends_on:
      - prometheus

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      WORKLIST_URL: http://worklist:3001
      INTEGRATION_URL: http://integration:3002
      DICTATION_URL: http://dictation:3003
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-radflow-demo-secret-change-me}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '${API_GATEWAY_PORT:-3010}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 10

  worklist:
    build:
      context: .
      dockerfile: services/worklist/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://radflow:radflow@postgres:5432/radflow
      NATS_URL: nats://nats:4222
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '${WORKLIST_PORT:-3001}:3001'
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 3s
      retries: 10

  integration:
    build:
      context: .
      dockerfile: services/integration/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      MLLP_PORT: 2575
      NATS_URL: nats://nats:4222
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_PUBLIC_URL: http://localhost:${ORTHANC_HTTP_PORT:-8042}
      WORKLIST_URL: http://worklist:3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '${INTEGRATION_PORT:-3002}:3002'
      - '${MLLP_PORT:-2575}:2575'
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 3s
      retries: 10

  dictation:
    build:
      context: .
      dockerfile: services/dictation/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://radflow:radflow@postgres:5432/radflow_dictation
      NATS_URL: nats://nats:4222
      REPORT_AI_URL: http://report-ai:8000
      WORKLIST_URL: http://worklist:3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - '${DICTATION_PORT:-3003}:3003'
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://localhost:3003/health']
      interval: 10s
      timeout: 3s
      retries: 10

  report-ai:
    build:
      context: .
      dockerfile: services/report-ai/Dockerfile
    environment:
      PORT: '8000'
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - '${REPORT_AI_PORT:-8000}:8000'
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python3',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${WEB_PORT:-5173}:80'
    depends_on:
      - api-gateway

volumes:
  pgdata:
  natsdata:
  orthancdata:
  promdata:
  grafanadata:
